# nbd-vram runtime configuration. Sourced by shell scripts (POSIX sh).
# Changes take effect on next service start or power-check poll.

# Master switch. Set to 1 to enable power-aware auto-management.
# Default: 0 (disabled - service runs regardless of power state)
VRAM_POWER_MANAGEMENT=0

# Disable VRAM swap when running on battery (AC unplugged).
# When set to 1, service is stopped whenever AC is offline, regardless of battery %.
# Only evaluated when VRAM_POWER_MANAGEMENT=1.
VRAM_DISABLE_ON_BATTERY=1

# Disable VRAM swap when battery capacity drops below this percentage.
# Only checked when on battery and VRAM_DISABLE_ON_BATTERY=0.
# Set to 0 to never disable based on battery level alone.
# Only evaluated when VRAM_POWER_MANAGEMENT=1.
VRAM_BATTERY_THRESHOLD=20
